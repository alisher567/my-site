<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сайт Алишера</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #eef2f3;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.5s ease; /* Плавная смена цвета */
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #2c3e50; }
        img { 
            border-radius: 15px; 
            margin: 20px 0; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { 
            background-color: #e67e22; 
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Привет! Это сайт Алишера</h1>
        <p>Нажми на кнопку, чтобы запустить скрипт взлома цветов!</p>
        
        <img src="https://placedog.net/300/200" alt="Собачка">
        
        <br>
        <button onclick="sayHello()">Алишер, жми сюда!</button>
    </div>

    <script>
        function sayHello() {
            // Спрашиваем имя, но по умолчанию предлагаем "Алишер"
            let name = prompt("Как тебя зовут?", "Алишер");

            // Если введено имя (или оставлено по умолчанию)
            if (name) {
                alert("Привет, " + name + "! Теперь ты официально меняешь реальность!");
            } else {
                alert("Привет, Алишер! Цвет сейчас изменится!");
            }

            // Магия цвета
            const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
            document.body.style.backgroundColor = randomColor;
        }
    </script>

</body>
</html>
